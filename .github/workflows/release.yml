name: Release

on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libssh2
        run: brew install libssh2

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PKG_CONFIG_PATH: /opt/homebrew/opt/libssh2/lib/pkgconfig:/usr/local/opt/libssh2/lib/pkgconfig

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/fastclaw dist/fastclaw-${{ matrix.target }}
          cd dist
          tar -czf fastclaw-${{ matrix.target }}.tar.gz fastclaw-${{ matrix.target }}

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fastclaw-${{ matrix.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
